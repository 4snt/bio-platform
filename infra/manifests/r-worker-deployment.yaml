apiVersion: apps/v1
kind: Deployment
metadata:
  name: bio-r-worker
  namespace: bioinformatica
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bio-r-worker
  template:
    metadata:
      labels:
        app: bio-r-worker
    spec:
      nodeSelector:
        kubernetes.io/hostname: agent-1
      tolerations:
        - key: "only-r-worker"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: bio-r-worker
          image: ghcr.io/org/bio-rworker:latest
          envFrom:
            - secretRef:
                name: bio-platform-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
