apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: bioinformatica
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      nodeSelector:
        kubernetes.io/hostname: agent-4
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: bioinformatica
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: bio-platform-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bio-platform-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pg-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: bioinformatica
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
