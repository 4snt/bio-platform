version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: bioinformatica
      POSTGRES_USER: api_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d

  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: changeme
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - elasticsearch
      - minio
    volumes:
      - ./api:/app

  r-worker:
    build: ./r-worker
    env_file: .env
    depends_on:
      - postgres
      - elasticsearch
      - minio

volumes:
  pg_data:
  es_data:
  minio_data:
